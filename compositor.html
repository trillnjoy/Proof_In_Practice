<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drink Compositor v3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--ink:#2c1f0e;--parchment:#f5efe0;--amber:#c17f3a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lora',Georgia,serif;background:#1a1008 !important;color:#f5efe0 !important;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 40px;}
h1{font-family:'Playfair Display',serif;font-size:.95rem;letter-spacing:.14em;text-transform:uppercase;color:#c17f3a !important;margin-bottom:14px;}
#preview-wrap{width:180px;height:230px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:visible;background:#1a1008 !important;border-radius:8px;}
#preview-svg{width:100%;height:100%;overflow:visible;}
#controls{width:100%;max-width:400px;background:#1a1008 !important;}
.section{border-bottom:1px solid rgba(255,255,255,.15);padding:11px 0;}
.section:last-child{border-bottom:none;}
.section-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:#c17f3a !important;margin-bottom:8px;}
/* Two-row vessel grid */
.vessel-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
/* Single-row scrolling for citrus/garnish/extras */
.option-row{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;flex-wrap:nowrap;}
.option-row::-webkit-scrollbar{display:none;}
/* Narrower buttons */
.opt-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;background:#2a1a08 !important;border:1.5px solid rgba(255,255,255,.18);border-radius:5px;padding:6px 3px 5px;cursor:pointer;width:50px;transition:all .15s ease;}
.opt-btn:hover{border-color:var(--amber);background:rgba(193,127,58,.12);}
.opt-btn.active{background:#f5efe0 !important;border-color:#f5efe0 !important;}
.opt-btn.active .opt-label{color:#2c1f0e;}.opt-btn.active .opt-icon svg{filter:brightness(0.5);}
/* Vessel buttons slightly wider to fill grid */
.vessel-grid .opt-btn{width:100%;background:#2a1a08 !important;}
.opt-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.opt-icon svg{width:100%;height:100%;}
.opt-label{font-size:.48rem;letter-spacing:.04em;text-transform:uppercase;text-align:center;line-height:1.2;white-space:pre-line;color:#c8b898 !important;}
.color-row{display:flex;align-items:center;gap:8px;}
.color-clear-btn{background:#2a1a08 !important;border:1.5px solid rgba(255,255,255,.25);border-radius:5px;color:#c8b898 !important;font-family:'Lora',serif;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.color-clear-btn:hover{border-color:var(--amber);}
.color-clear-btn.active{background:#f5efe0 !important;border-color:#f5efe0 !important;color:#2c1f0e !important;}
input[type="color"]{width:48px;height:36px;border:1.5px solid rgba(255,255,255,.2);border-radius:5px;background:none;cursor:pointer;padding:2px;}
.color-hex{font-size:.68rem;color:#a08060 !important;font-family:monospace;}
#json-out{margin-top:16px;width:100%;max-width:400px;background:#2a1a08 !important;border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:10px 12px;font-family:monospace;font-size:.66rem;color:#c17f3a !important;line-height:1.6;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body style="background:#1a1008 !important;color:#f5efe0 !important;"><div id="app-shell" style="background:#1a1008;min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;padding:0;">
<script>document.documentElement.style.setProperty("background","#1a1008","important");document.body.style.setProperty("background","#1a1008","important");document.body.style.setProperty("color","#f5efe0","important");</script>

    <g id="vessel-layer"></g>
    <g id="liquid-layer"></g>
    <g id="float-layer"></g>
    <g id="ice-layer"></g>
    <g id="vessel-mask-layer"></g>
    <g id="garnish-layer"></g>
    <g id="extras-layer"></g>
    <g id="vessel-rim-cover-layer"></g>
  </svg>
</div>
<div id="controls">
  <div class="section"><div class="section-label">Vessel</div><div class="vessel-grid" id="vessel-row"></div></div>
  <div class="section"><div class="section-label">Drink Color</div>

      <select id="float-select" style="background:#2a1a08;border:1.5px solid rgba(255,255,255,.25);border-radius:5px;color:#c8b898;font-size:.6rem;padding:4px 6px;font-family:Lora,serif;letter-spacing:.06em;">

        <option value="wine">Red wine float</option>
        <option value="rum">Dark rum float</option>

  <div class="section"><div class="section-label">Extras</div><div class="option-row" id="extras-row"></div></div>
</div>

/* ── LIQUID ── */
function drawLiquid(vessel,color){
  if(!color)return'';
  const g=GEO[vessel]||GEO.rocks;
  const fillY=g.top+(g.bot-g.top)*g.lf;
  const hw=g.ihw; // inner half-width
  const c=color, op='0.88';
  const meniscus=`<line x1="${90-hw}" y1="${fillY}" x2="${90+hw}" y2="${fillY}" stroke="rgba(255,255,255,0.28)" stroke-width="1.2"/>`;
  const fills={
    rocks:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    collins:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    highball:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    coupe:`<path d="M${90-hw},${fillY} Q90,${fillY+4} ${90+hw},${fillY} Q142,115 90,120 Q38,115 ${90-hw},${fillY} Z" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    cocktail:`<path d="M${90-(hw*(1-(fillY-26)/84))},${fillY} L${90+(hw*(1-(fillY-26)/84))},${fillY} L87,108 Q90,114 93,108 L${90+(hw*(1-(fillY-26)/84))},${fillY} Z" fill="${c}" opacity="0.86" clip-path="url(#${g.clipId})"/>`,
    'nick-nora':`<path d="M${90-hw},${fillY} Q90,${fillY+2} ${90+hw},${fillY} Q126,68 90,73 Q54,68 ${90-hw},${fillY} Z" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    flute:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    snifter:`<path d="M${90-hw},${fillY} L${90+hw},${fillY} Q140,124 114,150 Q90,162 66,150 Q40,124 ${90-hw},${fillY} Z" fill="${c}" opacity="0.86" clip-path="url(#${g.clipId})"/>`,
    port:`<path d="M${90-hw},${fillY} Q90,${fillY-2} ${90+hw},${fillY} Q122,124 90,130 Q58,124 ${90-hw},${fillY} Z" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    irish:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
    tropical:`<path d="M${90-hw+((fillY-40)*0.15)},${fillY} Q90,${fillY-4} ${90+hw-((fillY-40)*0.15)},${fillY} Q124,108 124,156 Q90,170 56,156 Q50,108 ${90-hw+((fillY-40)*0.15)},${fillY} Z" fill="${c}" opacity="0.86" clip-path="url(#${g.clipId})"/>`,
    julep:`<path d="M${90-hw+((fillY-34)*0.05)},${fillY} L${90+hw-((fillY-34)*0.05)},${fillY} L132,170 L48,170 Z" fill="${c}" opacity="0.86" clip-path="url(#${g.clipId})"/>`,
    mule:`<rect x="${90-hw}" y="${fillY}" width="${hw*2}" height="${g.bot-fillY}" fill="${c}" opacity="${op}" clip-path="url(#${g.clipId})"/>`,
  };
  return (fills[vessel]||fills.rocks)+meniscus;
}

/* ── FLOAT LAYER ── */
function drawFloat(vessel,color,floatType){
  if(!color||!floatType)return'';
  const g=GEO[vessel]||GEO.rocks;
  const fillY=g.top+(g.bot-g.top)*g.lf;
  const hw=g.ihw;
  // Dark rum float: rich mahogany brown, clearly distinct from base drink
  // Wine float: deep burgundy
  // Float sits ON TOP of drink at meniscus, visibly thick (~16px)
  const fc=floatType==='wine'?'rgba(120,0,40,0.82)':'rgba(60,15,0,0.85)';
  const fh=16; // float height in px — thick enough to be clearly visible
  return `<rect x="${90-hw+1}" y="${fillY-fh}" width="${hw*2-2}" height="${fh}" fill="${fc}" rx="1" clip-path="url(#${g.clipId})"/>
          <!-- Float surface highlight — shows the interface between float and drink -->
          <line x1="${90-hw+1}" y1="${fillY-fh}" x2="${90+hw-1}" y2="${fillY-fh}"
            stroke="rgba(180,80,20,0.55)" stroke-width="1.5"/>
          <!-- Bottom interface -->
          <line x1="${90-hw}" y1="${fillY}" x2="${90+hw}" y2="${fillY}"
            stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>`;
}

/* ── ICE: fills from meniscus to vessel bottom, inset from walls ── */
function drawIce(type,vessel){
  if(!type)return'';
  const g=GEO[vessel]||GEO.rocks;
  const fillY=g.top+(g.bot-g.top)*g.lf;
  const botY=g.bot-4;
  const cx=90, hw=g.ihw;
  const ic='rgba(208,234,255,0.50)',is='rgba(172,214,255,0.72)';
  const iStr=`fill="${ic}" stroke="${is}" stroke-width="1.1"`;

  if(type==='huge'){
    const iceH=botY-fillY;
    const sz=Math.min(hw*1.55, iceH*0.82);
    const iy=fillY+(iceH-sz)*0.5+sz*0.5;
    return `<rect x="${cx-sz*0.5}" y="${iy-sz*0.5}" width="${sz}" height="${sz}" rx="4" ${iStr} transform="rotate(8,${cx},${iy})"/>
            <line x1="${cx-sz*0.36}" y1="${iy-sz*0.36}" x2="${cx-sz*0.3}" y2="${iy+sz*0.18}" stroke="rgba(255,255,255,0.26)" stroke-width="1.6" stroke-linecap="round"/>`;
  }
  if(type==='cubes'){
    const iceH=botY-fillY;
    const sz=Math.min(hw*0.68, iceH*0.46);
    const parts=[];
    const rows=iceH>sz*2.4?2:1;
    for(let r=0;r<rows;r++){
      const iy=fillY+sz*0.5+r*(sz+5)+3;
      const cols2=hw>sz*0.9?2:1;
      for(let cc=0;cc<cols2;cc++){
        const ix=cx+(cc-(cols2-1)*0.5)*(sz+4);
        parts.push(`<rect x="${(ix-sz*0.5).toFixed(1)}" y="${(iy-sz*0.5).toFixed(1)}" width="${sz.toFixed(1)}" height="${sz.toFixed(1)}" rx="2.5" ${iStr} transform="rotate(${r*3+cc*5-3},${ix.toFixed(1)},${iy.toFixed(1)})"/>`);
      }
    }
    return parts.join('');
  }
  if(type==='crushed'){
    // Fill region as tinted rect, then draw crisp individual shard outlines on top — no hazy background polygon
    const shards=[];
    const count=Math.round(hw*0.7);
    for(let i=0;i<count;i++){
      const sx=cx-hw*0.85+Math.random()*hw*1.7;
      const sy=fillY+4+Math.random()*(botY-fillY-12);
      const points=[];
      const n=5+Math.floor(Math.random()*2);
      for(let j=0;j<n;j++){
        const a=(j/n)*Math.PI*2+(Math.random()-0.5)*0.4;
        const r=4+Math.random()*6;
        points.push(`${(sx+Math.cos(a)*r).toFixed(1)},${(sy+Math.sin(a)*r).toFixed(1)}`);
      }
      shards.push(`<polygon points="${points.join(' ')}" fill="rgba(218,240,255,0.48)" stroke="rgba(180,218,255,0.72)" stroke-width="0.9"/>`);
    }
    return shards.join('');
  }
  return'';
}

/* ── GARNISH COMPOSITE ── */
function drawGarnish(id,vessel,slot){
  const g=GEO[vessel]||GEO.rocks;
  const flat=FLAT.has(vessel);
  const rimY=g.top+3;
  const offsets=[0,-22,22,-36,36];
  const x=90+(offsets[slot]||0);
  const y=rimY;

  if(id==='cherry'){
    // Luxardo: dark single cherry that sinks — placed low in glass
    const fillY=g.top+(g.bot-g.top)*g.lf;
    const botY=g.bot-12;
    const cy2=fillY+(botY-fillY)*0.6; // sinks toward bottom
    const cx2=x===90?90:x*0.3+90*0.7; // pull toward center for sunk look
    return `<circle cx="${cx2}" cy="${cy2}" r="9" fill="#3a0808" stroke="#220404" stroke-width="1"/>
            <circle cx="${cx2-2}" cy="${cy2-3}" r="3.5" fill="#5a1010" opacity="0.5"/>
            <path d="M${cx2} ${cy2-9} Q${cx2+8} ${cy2-26} ${cx2+14} ${cy2-32}" fill="none" stroke="#2e4a18" stroke-width="1.6" stroke-linecap="round"/>`;
  }

  if(id==='strawberry'){
    const sy=flat?y-4:y-10;
    return `<path d="M${x-14} ${sy+10} Q${x-14} ${sy+24} ${x} ${sy+26} Q${x+14} ${sy+24} ${x+14} ${sy+10} Q${x+10} ${sy+4} ${x} ${sy+4} Q${x-10} ${sy+4} ${x-14} ${sy+10} Z" fill="#d94040" stroke="#a02020" stroke-width="1"/>
            <ellipse cx="${x}" cy="${sy+18}" rx="6" ry="7" fill="rgba(255,255,255,0.68)"/>
            <line x1="${x-10}" y1="${sy+9}" x2="${x-13}" y2="${sy+20}" stroke="#a02020" stroke-width="0.7" opacity="0.5"/>
            <line x1="${x+10}" y1="${sy+9}" x2="${x+13}" y2="${sy+20}" stroke="#a02020" stroke-width="0.7" opacity="0.5"/>
            <line x1="${x-5}" y1="${sy+5}" x2="${x-6}" y2="${sy+26}" stroke="#a02020" stroke-width="0.6" opacity="0.35"/>
            <line x1="${x+5}" y1="${sy+5}" x2="${x+6}" y2="${sy+26}" stroke="#a02020" stroke-width="0.6" opacity="0.35"/>
            <path d="M${x-10} ${sy+8} Q${x-8} ${sy+2} ${x-4} ${sy+3} Q${x-2} ${sy} ${x} ${sy+1} Q${x+2} ${sy} ${x+4} ${sy+3} Q${x+8} ${sy+2} ${x+10} ${sy+8}" fill="#3a7a20" stroke="#2a5a10" stroke-width="0.8"/>`;
  }

  if(id==='olive'){
    // 3-olive skewer
    if(flat){
      return `<line x1="${x-30}" y1="${y}" x2="${x+30}" y2="${y-5}" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
              <ellipse cx="${x-18}" cy="${y-2}" rx="8" ry="6.5" fill="#6b9e52" stroke="#4a7030" stroke-width="1" transform="rotate(-10,${x-18},${y-2})"/>
              <ellipse cx="${x}" cy="${y-3}" rx="8" ry="6.5" fill="#7aae60" stroke="#4a7030" stroke-width="1" transform="rotate(-10,${x},${y-3})"/>
              <ellipse cx="${x+18}" cy="${y-4.5}" rx="8" ry="6.5" fill="#6b9e52" stroke="#4a7030" stroke-width="1" transform="rotate(-10,${x+18},${y-4.5})"/>`;
    }else{
      return `<line x1="${x+6}" y1="${y+22}" x2="${x+30}" y2="${y-10}" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
              <ellipse cx="${x+12}" cy="${y+12}" rx="7.5" ry="6" fill="#6b9e52" stroke="#4a7030" stroke-width="1" transform="rotate(-35,${x+12},${y+12})"/>
              <ellipse cx="${x+18}" cy="${y+2}" rx="7.5" ry="6" fill="#7aae60" stroke="#4a7030" stroke-width="1" transform="rotate(-35,${x+18},${y+2})"/>
              <ellipse cx="${x+24}" cy="${y-8}" rx="7.5" ry="6" fill="#6b9e52" stroke="#4a7030" stroke-width="1" transform="rotate(-35,${x+24},${y-8})"/>`;
    }
  }

  if(id==='celery'){
    // Stalk base at vessel bottom, top extends above rim
    // Stalk: from g.bot up to g.top, leaves above g.top
    const stalkBot=g.bot-4;
    const stalkTop=g.top;   // stalk ends at rim
    const leafTop=g.top-24; // leaves extend 24px above rim
    const stalkH=stalkBot-stalkTop;
    const sx=flat?x:x+10; // shift right for non-flat vessels
    const tilt=flat?-8:15;
    // Stalk: rectangular with flat ends and striations
    return `<g transform="rotate(${tilt},${sx},${stalkBot})">
      <rect x="${sx-4}" y="${stalkTop}" width="8" height="${stalkH}" rx="1"
        fill="#7ab840" stroke="#4a8020" stroke-width="1"/>
      <line x1="${sx-1.5}" y1="${stalkTop}" x2="${sx-1.5}" y2="${stalkBot}"
        stroke="#4a8020" stroke-width="0.6" opacity="0.45"/>
      <line x1="${sx+1.5}" y1="${stalkTop}" x2="${sx+1.5}" y2="${stalkBot}"
        stroke="#4a8020" stroke-width="0.6" opacity="0.45"/>
      <!-- Individual serrated leaves — NOT a single arch -->
      <path d="M${sx-4} ${stalkTop}
               C${sx-14} ${stalkTop-6} ${sx-16} ${stalkTop-18} ${sx-6} ${stalkTop-22}
               C${sx-2} ${stalkTop-24} ${sx} ${stalkTop-20} ${sx-4} ${stalkTop}"
        fill="#5a9e2a" stroke="#3a7010" stroke-width="0.8"/>
      <path d="M${sx} ${stalkTop-4}
               C${sx-6} ${stalkTop-14} ${sx-4} ${stalkTop-28} ${sx+2} ${stalkTop-30}
               C${sx+6} ${stalkTop-32} ${sx+8} ${stalkTop-26} ${sx+4} ${stalkTop-12}
               C${sx+2} ${stalkTop-6} ${sx} ${stalkTop-4} ${sx} ${stalkTop-4}"
        fill="#4a8e1a" stroke="#3a7010" stroke-width="0.8"/>
      <path d="M${sx+4} ${stalkTop}
               C${sx+14} ${stalkTop-4} ${sx+18} ${stalkTop-16} ${sx+10} ${stalkTop-20}
               C${sx+6} ${stalkTop-22} ${sx+4} ${stalkTop-18} ${sx+4} ${stalkTop}"
        fill="#5a9e2a" stroke="#3a7010" stroke-width="0.8"/>
    </g>`;
  }

  if(id==='pineapple-wedge'){
    // HALF-DISC — identical physics to citrus wedge, but r ~2x larger.
    // Canonical: flat face horizontal at y=0, arc sweeps DOWNWARD (sweep=0).
    // Built at origin, transformed to rim anchor then rotated 180°.
    // Pineapple anatomy: bronze-brown rind arc, gold flesh, concentric striation arcs,
    // radial spokes from centre downward, slit downward through rind only.
    const r = Math.max(28, Math.min(42, g.ohw * 0.9));
    const rindT = r * 0.16;
    const innerR = r - rindT;
    const slitD = rindT; // slit through rind only for pineapple

    // Narrow vessel offset (same logic as citrus)
    const narrowOffset = g.ohw < 30 ? Math.max(0, r - g.ohw * 0.5) : 0;
    const ax = 90 + g.ohw + narrowOffset + 4; // +4: pineapple sits slightly further out
    const rimTopOverrides = { mule: 20 };
    const visualRimTop = rimTopOverrides[vessel] !== undefined ? rimTopOverrides[vessel] : g.top;
    const ay = visualRimTop + slitD;

    // Spokes: from (0,0) downward, same sin/cos pattern as citrus
    const segAngles = [-70,-42,-14,14,42,70];
    const segs = segAngles.map(a => {
      const rad = a * Math.PI / 180;
      const ex = (innerR * Math.sin(rad)).toFixed(1);
      const ey = (innerR * Math.cos(rad)).toFixed(1);
      return `<line x1="0" y1="0" x2="${ex}" y2="${ey}" stroke="#c8a010" stroke-width="0.9" opacity="0.4"/>`;
    }).join('');

    // Concentric striation arcs at 35%, 55%, 72% of innerR — drawn downward (sweep=0)
    const stripes = [0.35, 0.55, 0.72].map(frac => {
      const sr = (innerR * frac).toFixed(1);
      return `<path d="M${-sr},0 A${sr},${sr} 0 0,0 ${sr},0" fill="none" stroke="#c8a010" stroke-width="0.8" opacity="0.45"/>`;
    }).join('');

    return `<g transform="translate(${ax},${ay}) rotate(180)">
      <!-- FLESH body: flat face at y=0, arc downward (sweep=0) -->
      <path d="M${-r},0 A${r},${r} 0 0,0 ${r},0 Z"
        fill="#f5c830" stroke="#8a5a08" stroke-width="1.2"/>
      <!-- Concentric flesh striations -->
      ${stripes}
      <!-- Radial spokes downward into disc -->
      ${segs}
      <!-- Centre division: light -->
      <line x1="0" y1="0" x2="0" y2="${innerR}"
        stroke="rgba(255,230,100,0.85)" stroke-width="1.2"/>
      <!-- RIND: bronze-brown arc band, outer sweep=0, inner sweep=1 (closing) -->
      <path d="M${-r},0 A${r},${r} 0 0,0 ${r},0
               L${innerR},0 A${innerR},${innerR} 0 0,1 ${-innerR},0 Z"
        fill="#8a5a08" stroke="#6a3a04" stroke-width="0.8"/>
      <!-- SLIT: downward from centre through rind — grips rim -->
      <line x1="0" y1="0" x2="0" y2="${slitD}"
        stroke="#8a5a08" stroke-width="2.2" opacity="0.9"/>
    </g>`;
  }

  if(id==='cucumber-slice'){
    // Cucumber is dense — sinks and rests on interior bottom of glass
    const r=11;
    // cx centred in vessel inner width, offset slightly by slot
    const innerOffset=(offsets[slot]||0)*0.3; // reduced offset, pulled toward centre
    const cx3=90+innerOffset;
    // cy: rests on vessel bottom interior
    const cy3=g.bot-r-2;
    // Render with slight opacity to read as submerged
    return `<circle cx="${cx3}" cy="${cy3}" r="${r}" fill="#81c784" stroke="#4caf50" stroke-width="1.2" opacity="0.82"/>
            <circle cx="${cx3}" cy="${cy3}" r="${r*0.65}" fill="#a5d6a7" opacity="0.82"/>
            <circle cx="${cx3}" cy="${cy3}" r="${r*0.32}" fill="#c8e6c9" opacity="0.82"/>
            <line x1="${cx3-6}" y1="${cy3-7}" x2="${cx3+4}" y2="${cy3+5}" stroke="#4caf50" stroke-width="0.7" opacity="0.4"/>
            <line x1="${cx3+6}" y1="${cy3-7}" x2="${cx3-4}" y2="${cy3+5}" stroke="#4caf50" stroke-width="0.7" opacity="0.4"/>`;
  }
  return'';
}

/* ── CITRUS COMPOSITE ── */
function drawCitrus(citrusId,vessel){
  if(!citrusId)return'';
  const g=GEO[vessel]||GEO.rocks;
  const flat=FLAT.has(vessel);
  const rimY=g.top;
  const s=Math.max(0.9,Math.min(1.3,g.ihw/36));
  // Position: right side of rim
  const rx=flat?90+g.ohw-6:90+g.ohw+2;
  const ry=flat?rimY+4:rimY+14;
  const fruit=citrusId.split('-')[0];
  const type=citrusId.includes('twist')?'twist':citrusId.includes('wedge')?'wedge':'peel';

  const cols={lemon:{f:'#f5df60',s:'#c8a810',d:'#d4b820',l:'#f9ef88'},
              lime:{f:'#8aca6a',s:'#4a8030',d:'#5a9040',l:'#aadd88'},
              orange:{f:'#f0a050',s:'#a05010',d:'#c06020',l:'#f8c080'}};
  const col=cols[fruit]||cols.lemon;

  if(type==='twist'){
    // S-curve spiral ribbon
    const x=rx-8*s, y2=ry+2*s;
    return `<path d="M${x} ${y2} C${x-16*s} ${y2-14*s} ${x+8*s} ${y2-26*s} ${x+16*s} ${y2-10*s} C${x+24*s} ${y2+4*s} ${x+8*s} ${y2+20*s} ${x-2*s} ${y2+12*s}" fill="none" stroke="${col.f}" stroke-width="${4.5*s}" stroke-linecap="round"/>
            <path d="M${x+1*s} ${y2} C${x-11*s} ${y2-10*s} ${x+8*s} ${y2-22*s} ${x+13*s} ${y2-6*s}" fill="none" stroke="${col.l}" stroke-width="${2*s}" stroke-linecap="round" opacity="0.5"/>`;
  }
  if(type==='wedge'){
    // ── HALF-DISC WEDGE — canonical: flat face HORIZONTAL at y=0, arc downward ──
    //
    // At origin: flat edge from (-r,0) to (+r,0). Arc sweeps DOWNWARD (positive y).
    // Centre of flat face = (0,0) = the rim anchor point.
    // Spokes radiate from (0,0) downward into the disc (positive y).
    // Slit goes from (0,0) downward (+y) through rind+pith = into the fruit below rim.
    // Half disc below rim = outside glass (hanging down). Upper half = inside glass.
    //
    // Rotation to match vessel wall:
    //   Horizontal rim (coupe, cocktail, rocks, snifter, mule): 0° — no rotation needed
    //   ~45° wall (tropical, nick-nora): rotate -45° (CCW)
    //   Near-vertical wall (collins, highball, irish, flute, julep): rotate -90° (CCW)
    //
    // All vessels: arc points DOWN (180° rotation of canonical).
    // Narrow tall vessels get an outward offset so the wedge clears the vessel wall.
    const wallAng = 180;

    const r = Math.max(14, Math.min(24, g.ohw * 0.58));
    const rindT = r * 0.18;
    const pithT = r * 0.12;
    const innerR = r - rindT - pithT;
    const slitD = rindT + pithT;

    // Narrow vessels: push anchor outward so wedge clears vessel wall
    const narrowOffset = g.ohw < 30 ? Math.max(0, r - g.ohw * 0.5) : 0;
    const ax = 90 + g.ohw + narrowOffset;
    // Per-vessel visual rim top (may differ from g.top due to decorative rim elements)
    const rimTopOverrides = { mule: 20 };
    const visualRimTop = rimTopOverrides[vessel] !== undefined ? rimTopOverrides[vessel] : g.top;
    // Shift down by slitD so pith/pulp boundary (not flat face centre) lands on rim
    const ay = visualRimTop + slitD;

    // Spokes: from (0,0) downward into disc. Angles from +y axis (downward).
    // cos/sin with angle from +y: x=sin(a)*innerR, y=cos(a)*innerR
    const segAngles = [-70,-42,-14,14,42,70];
    const segs = segAngles.map(a => {
      const rad = a * Math.PI / 180;
      const ex = (innerR * Math.sin(rad)).toFixed(1);
      const ey = (innerR * Math.cos(rad)).toFixed(1);
      return `<line x1="0" y1="0" x2="${ex}" y2="${ey}" stroke="${col.s}" stroke-width="0.8" opacity="0.35"/>`;
    }).join('');

    // All elements grouped — rotate as a single unit around anchor point
    return `<g transform="translate(${ax},${ay}) rotate(${wallAng})">
      <!-- PULP body: flat face at y=0, arc sweeps DOWNWARD (sweep=0 goes through +y) -->
      <path d="M${-r},0 A${r},${r} 0 0,0 ${r},0 Z"
        fill="${col.f}" stroke="${col.s}" stroke-width="1"/>
      <!-- Spokes: from (0,0) downward into disc — grouped with disc -->
      ${segs}
      <!-- Centre division: white, straight downward -->
      <line x1="0" y1="0" x2="0" y2="${innerR}"
        stroke="rgba(255,255,255,0.75)" stroke-width="1.2"/>
      <!-- PITH: white arc band — outer arc sweep=0 (down), inner arc sweep=1 (up, closing path) -->
      <path d="M${-(r-rindT)},0 A${r-rindT},${r-rindT} 0 0,0 ${r-rindT},0
               L${innerR},0 A${innerR},${innerR} 0 0,1 ${-innerR},0 Z"
        fill="rgba(255,255,255,0.62)"/>
      <!-- RIND: outer arc sweep=0 (down), inner arc sweep=1 (up, closing path) -->
      <path d="M${-r},0 A${r},${r} 0 0,0 ${r},0
               L${r-rindT},0 A${r-rindT},${r-rindT} 0 0,1 ${-(r-rindT)},0 Z"
        fill="${col.d}" stroke="${col.s}" stroke-width="0.8"/>
      <!-- SLIT: downward into disc (+y) through rind+pith — grips the rim -->
      <line x1="0" y1="0" x2="0" y2="${slitD}"
        stroke="${col.s}" stroke-width="2" opacity="0.9"/>
    </g>`;
  }
  if(type==='peel'){
    const px=rx-8*s, py2=ry+6*s;
    return `<path d="M${px-13*s} ${py2+10*s} C${px-20*s} ${py2-8*s} ${px+8*s} ${py2-14*s} ${px+16*s} ${py2+4*s} C${px+20*s} ${py2+14*s} ${px+7*s} ${py2+20*s} ${px-2*s} ${py2+16*s}" fill="${col.f}" stroke="${col.s}" stroke-width="1.1" opacity="0.95"/>
            <path d="M${px-11*s} ${py2+8*s} C${px-17*s} ${py2-6*s} ${px+7*s} ${py2-10*s} ${px+13*s} ${py2+5*s}" fill="none" stroke="${col.l}" stroke-width="${1.1*s}" opacity="0.45"/>`;
  }
  return'';
}

/* ── EXTRAS COMPOSITE ── */
function drawExtras(set,vessel){
  const g=GEO[vessel]||GEO.rocks;
  const topY=g.top;
  const flat=FLAT.has(vessel);
  const fillY=g.top+(g.bot-g.top)*g.lf;
  const botY=g.bot-4;
  const parts=[];

  if(set.has('umbrella')){
    // Umbrella body is UPRIGHT (vertical). Only the wooden stick is at an angle.
    // Umbrella center above rim; stick goes diagonally down into drink
    const ux=100, uy=topY-32; // umbrella centered above rim, upright
    const stickTopX=ux, stickTopY=uy+32;
    const stickBotX=ux+28, stickBotY=topY+60; // stick angled right into drink
    parts.push(`
      <!-- Umbrella canopy upright -->
      <path d="M${ux} ${uy} Q${ux-22} ${uy+20} ${ux-20} ${uy+32} Q${ux} ${uy+26} ${ux+20} ${uy+32} Q${ux+22} ${uy+20} ${ux} ${uy} Z" fill="#4fc3f7" stroke="#0288d1" stroke-width="1"/>
      <line x1="${ux}" y1="${uy}" x2="${ux-20}" y2="${uy+32}" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <line x1="${ux}" y1="${uy}" x2="${ux-10}" y2="${uy+33}" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <line x1="${ux}" y1="${uy}" x2="${ux}" y2="${uy+33}" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <line x1="${ux}" y1="${uy}" x2="${ux+10}" y2="${uy+33}" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <line x1="${ux}" y1="${uy}" x2="${ux+20}" y2="${uy+32}" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
      <path d="M${ux-18} ${uy+28} Q${ux} ${uy+22} ${ux+10} ${uy+24}" fill="rgba(255,255,255,0.18)"/>
      <!-- Wooden stick: angled, separate from umbrella body -->
      <line x1="${stickTopX}" y1="${stickTopY}" x2="${stickBotX}" y2="${stickBotY}" stroke="#8B5E3C" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="${stickTopX}" y1="${stickTopY}" x2="${stickBotX-1}" y2="${stickBotY}" stroke="rgba(200,150,80,0.5)" stroke-width="0.9" stroke-linecap="round"/>
      <!-- Stick tip hook -->
      <path d="M${stickBotX} ${stickBotY} Q${stickBotX+5} ${stickBotY+6} ${stickBotX+2} ${stickBotY+10}" fill="none" stroke="#8B5E3C" stroke-width="1.8" stroke-linecap="round"/>`);
  }

  if(set.has('straw')){
    const sx=flat?90+g.ihw-8:90+g.ihw-4;
    const strawBot=botY-2;
    const strawTop=topY-20;
    const isMule=vessel==='mule';
    const strawColor=isMule?'#a8b8c0':'#4caf50';
    const strawStroke=isMule?'#708090':'#2e7d32';
    const strawHL=isMule?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.22)';
    parts.push(`<rect x="${sx-2.5}" y="${strawTop}" width="5" height="${strawBot-strawTop}" rx="2.5" fill="${strawColor}" stroke="${strawStroke}" stroke-width="0.8"/>
                <rect x="${sx-1.5}" y="${strawTop+1}" width="2" height="${strawBot-strawTop-2}" rx="1" fill="${strawHL}"/>`);
  }

  if(set.has('salted-rim')||set.has('tajin-rim')){
    const isT=set.has('tajin-rim');
    const baseColor=isT?'#d84020':'rgba(255,255,255,0.82)';
    const crystals=[];
    const hw=g.ohw;
    // distribute irregular rect crystals around rim
    const count=Math.round(hw*0.55);
    for(let i=0;i<count;i++){
      const t=i/count;
      const cx2=(90-hw)+t*hw*2;
      const w=2+Math.random()*3, h=2+Math.random()*3;
      const rot=Math.random()*40-20;
      const dy=(Math.random()-0.5)*2;
      crystals.push(`<rect x="${(cx2-w/2).toFixed(1)}" y="${(topY+dy-h/2).toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="0.4" fill="${baseColor}" transform="rotate(${rot.toFixed(0)},${cx2.toFixed(1)},${topY.toFixed(1)})"/>`);
      if(isT&&Math.random()>0.4){
        crystals.push(`<rect x="${(cx2-w*0.6).toFixed(1)}" y="${(topY+dy+2).toFixed(1)}" width="${(w*0.8).toFixed(1)}" height="${(h*0.7).toFixed(1)}" rx="0.3" fill="rgba(240,100,20,0.6)" transform="rotate(${(-rot).toFixed(0)},${cx2.toFixed(1)},${(topY+2).toFixed(1)})"/>`);
      }
    }
    parts.push(crystals.join(''));
  }

  if(set.has('whipped-cream')){
    // Whipped cream floats ON TOP of liquid (and above any float layer).
    // It mounds above the meniscus — base at fillY, peaks well above.
    // For vessels with a float, the cream sits on the float surface (still fillY).
    const hw2=g.ihw;
    const floatH = (S && S.float) ? 16 : 0; // match float layer height
    const wy=fillY - floatH; // base of cream sits on top of float layer, not at meniscus
    parts.push(`
      <!-- Base seal at meniscus -->
      <path d="M${90-hw2} ${wy} L${90+hw2} ${wy}" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <!-- Scalloped mounds rising above meniscus -->
      <path d="M${90-hw2} ${wy}
               Q${90-hw2*0.78} ${wy-12} ${90-hw2*0.5} ${wy-6}
               Q${90-hw2*0.28} ${wy-22} ${90-hw2*0.05} ${wy-16}
               Q${90+hw2*0.15} ${wy-26} ${90+hw2*0.35} ${wy-18}
               Q${90+hw2*0.55} ${wy-20} ${90+hw2*0.72} ${wy-10}
               Q${90+hw2*0.88} ${wy-15} ${90+hw2} ${wy}
               Z"
        fill="rgba(255,255,255,0.96)" stroke="rgba(210,210,210,0.5)" stroke-width="0.7"/>
      <!-- Inner highlight -->
      <path d="M${90-hw2*0.6} ${wy-4}
               Q${90-hw2*0.3} ${wy-20} ${90} ${wy-14}
               Q${90+hw2*0.2} ${wy-22} ${90+hw2*0.5} ${wy-14}"
        fill="rgba(255,255,255,0.5)" stroke="none"/>`);
  }

  if(set.has('mint-sprig')){
    const mx=flat?90+g.ihw-8:90+g.ihw-6;
    const my=topY-2;
    parts.push(`
      <line x1="${mx}" y1="${my+18}" x2="${mx-4}" y2="${my-2}" stroke="#1b5e20" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M${mx} ${my+18} C${mx-14} ${my+16} ${mx-16} ${my+6} ${mx-8} ${my+6} C${mx-4} ${my+6} ${mx-2} ${my+10} ${mx} ${my+18} Z" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.7"/>
      <path d="M${mx-8} ${my+10} C${mx-14} ${my+8} ${mx-12} ${my+4} ${mx-8} ${my+6}" fill="none" stroke="#4caf50" stroke-width="0.6" opacity="0.6"/>
      <path d="M${mx-2} ${my+10} C${mx+4} ${my+8} ${mx+6} ${my+2} ${mx+2} ${my+2} C${mx-2} ${my+2} ${mx-2} ${my+6} ${mx-2} ${my+10} Z" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.7"/>
      <path d="M${mx+3} ${my+5} C${mx+6} ${my+3} ${mx+5} ${my} ${mx+2} ${my+2}" fill="none" stroke="#4caf50" stroke-width="0.6" opacity="0.6"/>
      <path d="M${mx-4} ${my+2} C${mx-6} ${my-4} ${mx-2} ${my-6} ${mx} ${my-2} C${mx+2} ${my-6} ${mx+4} ${my-4} ${mx+2} ${my+2} Z" fill="#388e3c" stroke="#1b5e20" stroke-width="0.7"/>`);
  }
  return parts.join('');
}

/* ── RENDER ── */
function render(){
  const{vessel,color,float:fl,ice,citrus,garnish,extras}=S;
  document.getElementById('vessel-layer').innerHTML=drawVessel(vessel);
  document.getElementById('liquid-layer').innerHTML=drawLiquid(vessel,color);
  document.getElementById('float-layer').innerHTML=drawFloat(vessel,color,fl);
  document.getElementById('ice-layer').innerHTML=drawIce(ice,vessel);
  document.getElementById('vessel-mask-layer').innerHTML=drawVesselMask(vessel);
  document.getElementById('vessel-rim-cover-layer').innerHTML=drawVesselRimCover(vessel);
  const ga=[...garnish];
  document.getElementById('garnish-layer').innerHTML=ga.map((g,i)=>drawGarnish(g,vessel,i)).join('')+drawCitrus(citrus,vessel);
  document.getElementById('extras-layer').innerHTML=drawExtras(extras,vessel);
  document.getElementById('json-out').textContent=JSON.stringify({vessel:vessel==='cocktail'?'martini':vessel,color:color||null,float:fl||null,ice:ice||null,citrus:citrus||null,garnish:ga,extras:[...extras]},null,2);
}

/* ── UI ── */
function mkBtn(item,iconMap,activeCheck){
  const b=document.createElement('button');
  b.className='opt-btn'+(activeCheck(item.id)?' active':'');
  b.dataset.id=item.id;
  b.innerHTML=`<span class="opt-icon">${iconMap[item.id]||''}</span><span class="opt-label">${item.label}</span>`;
  return b;
}
function buildSingle(rowId,items,iconMap,key,isGrid){
  const row=document.getElementById(rowId);
  items.forEach(item=>{
    if(item.id==='spacer-row'){
      const sp=document.createElement('div');
      sp.style.cssText='width:100%;height:0;flex-basis:100%';
      row.appendChild(sp);
      return;
    }
    const b=mkBtn(item,iconMap,id=>S[key]===id);
    b.addEventListener('click',()=>{
      S[key]=key==='vessel'?item.id:(S[key]===item.id?null:item.id);
      row.querySelectorAll('.opt-btn').forEach(bb=>bb.classList.toggle('active',bb.dataset.id===S[key]));
      render();
    });
    row.appendChild(b);
  });
}
function buildMulti(rowId,items,iconMap,key){
  const row=document.getElementById(rowId);
  items.forEach(item=>{
    const b=mkBtn(item,iconMap,id=>S[key].has(id));
    b.addEventListener('click',()=>{
      S[key].has(item.id)?S[key].delete(item.id):S[key].add(item.id);
      b.classList.toggle('active',S[key].has(item.id));
      render();
    });
    row.appendChild(b);
  });
}
document.getElementById('color-picker').addEventListener('input',e=>{
  S.color=e.target.value;
  document.getElementById('color-hex').textContent=e.target.value;
  document.getElementById('color-clear-btn').classList.remove('active');
  render();
});
document.getElementById('color-clear-btn').addEventListener('click',()=>{
  S.color=null;
  document.getElementById('color-hex').textContent='—';
  document.getElementById('color-clear-btn').classList.add('active');
  render();
});
document.getElementById('float-select').addEventListener('change',e=>{
  S.float=e.target.value||null;
  render();
});
buildSingle('vessel-row',VESSELS,VI,'vessel',true);
buildSingle('ice-row',ICE,II,'ice');
buildSingle('citrus-row',CITRUS,CI,'citrus');
buildMulti('garnish-row',GARNISHES,GA,'garnish');
buildMulti('extras-row',EXTRAS,EX,'extras');
document.querySelector('#vessel-row .opt-btn').classList.add('active');
render();
</script>
